<div class="lp-picker" id="lp-picker">
  <noscript><p>The picker needs JavaScript — no problem: just <a href="/paths/">browse all the path guides</a> instead.</p></noscript>
</div>
<script>
(function () {
  var PATHS = {
    ai:         { title: "AI & Data Ethics",           url: "/paths/ai-data-ethics/",           blurb: "Working out what counts as fair or harmful in AI systems." },
    ethics:     { title: "Ethics Consulting",          url: "/paths/ethics-consulting/",        blurb: "Advising organisations on ethics questions, as a job." },
    consulting: { title: "Management Consulting",      url: "/paths/consulting/",               blurb: "Business problem-solving in small teams, with a clear graduate route in." },
    risk:       { title: "Risk & Catastrophic Risk",   url: "/paths/risk/",                     blurb: "Risk teams in tech, and research on large-scale threats." },
    blockchain: { title: "Blockchain & Fintech",       url: "/paths/blockchain-fintech/",       blurb: "Young companies building financial and governance systems from scratch." },
    vc:         { title: "Venture Capital",            url: "/paths/venture-capital/",          blurb: "Evaluating early startups for an investment fund." },
    startup:    { title: "Entrepreneurship & Startups",url: "/paths/entrepreneurship-startups/",blurb: "Starting a company, or joining one early." },
    media:      { title: "Media & Writing",            url: "/paths/media-writing/",            blurb: "Jobs where the writing is the work." },
    cyber:      { title: "Cybersecurity & Recruitment",url: "/paths/cybersecurity-recruitment/",blurb: "Finding and judging technical talent." },
    business:   { title: "Business, Mentoring & Beyond",url: "/paths/business-mentoring/",      blurb: "The ordinary roles most organisations run on." }
  };
  var QUESTIONS = [
    { q: "What could you happily do for three hours straight?",
      a: [
        { t: "Write, and rewrite, until an idea is clear", s: { media: 2, ai: 1 } },
        { t: "Argue about whether something is right or wrong", s: { ethics: 2, ai: 1 } },
        { t: "Work out why a system produces the behaviour it does", s: { blockchain: 2, risk: 1, vc: 1 } },
        { t: "Talk to new people and figure out what they're good at", s: { cyber: 2, business: 1 } },
        { t: "Plan something new and think about who would use it", s: { startup: 2, vc: 1 } }
      ]},
    { q: "Which headline would you read first?",
      a: [
        { t: "“Is this AI system fair?”", s: { ai: 2 } },
        { t: "“The company that promised ethics and got caught”", s: { ethics: 2, consulting: 1 } },
        { t: "“Could a blockchain replace a courtroom?”", s: { blockchain: 2 } },
        { t: "“How early investors decide which startups to back”", s: { vc: 2 } },
        { t: "“How close did we come to catastrophe?”", s: { risk: 2 } },
        { t: "“She quit her PhD and started a company”", s: { startup: 2 } }
      ]},
    { q: "Where would you rather spend your first working year?",
      a: [
        { t: "A big organisation with structure and a ladder", s: { consulting: 2, ai: 1, cyber: 1 } },
        { t: "A small team where I'd do a bit of everything", s: { startup: 2, blockchain: 1, vc: 1 } },
        { t: "Somewhere between a university and an office", s: { risk: 2, ethics: 1 } },
        { t: "Anywhere, as long as the work is mostly writing", s: { media: 2 } }
      ]},
    { q: "How do you feel about numbers?",
      a: [
        { t: "I'd rather read arguments than spreadsheets", s: { ethics: 1, media: 1, business: 1 } },
        { t: "I like arguments that have numbers in them", s: { consulting: 1, risk: 1, vc: 1 } },
        { t: "I find markets and money mechanics interesting", s: { blockchain: 2, vc: 1 } },
        { t: "I'm more interested in people than in either", s: { cyber: 1, business: 2 } }
      ]},
    { q: "How central should philosophy be to the work itself?",
      a: [
        { t: "Central. I want to work on ethics all day", s: { ethics: 2, ai: 1 } },
        { t: "In the background: careful thinking applied to something else", s: { consulting: 1, vc: 1, startup: 1, cyber: 1 } },
        { t: "I mostly want to write and explain ideas", s: { media: 2 } },
        { t: "I mostly want work that feels useful", s: { business: 2, risk: 1 } }
      ]}
  ];

  var root = document.getElementById("lp-picker");
  if (!root) return;
  var picks = [];

  function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

  function renderQuestion(i) {
    var q = QUESTIONS[i];
    var dots = QUESTIONS.map(function (_, j) {
      return '<span class="lp-picker-dot' + (j < i ? " done" : j === i ? " now" : "") + '"></span>';
    }).join("");
    var buttons = q.a.map(function (ans, j) {
      return '<button type="button" class="lp-picker-answer" data-j="' + j + '">' + esc(ans.t) + "</button>";
    }).join("");
    root.innerHTML =
      '<div class="lp-picker-progress">' + dots + '<span class="lp-picker-count">' + (i + 1) + " / " + QUESTIONS.length + "</span></div>" +
      '<div class="lp-picker-q">' + esc(q.q) + "</div>" +
      '<div class="lp-picker-answers">' + buttons + "</div>" +
      (i > 0 ? '<button type="button" class="lp-picker-back">&larr; back</button>' : "");
    root.querySelectorAll(".lp-picker-answer").forEach(function (btn) {
      btn.addEventListener("click", function () {
        picks[i] = parseInt(btn.getAttribute("data-j"), 10);
        if (i + 1 < QUESTIONS.length) renderQuestion(i + 1); else renderResult();
      });
    });
    var back = root.querySelector(".lp-picker-back");
    if (back) back.addEventListener("click", function () { renderQuestion(i - 1); });
  }

  function renderResult() {
    var scores = {};
    Object.keys(PATHS).forEach(function (k) { scores[k] = 0; });
    picks.forEach(function (j, i) {
      var s = QUESTIONS[i].a[j].s;
      Object.keys(s).forEach(function (k) { scores[k] += s[k]; });
    });
    var top = Object.keys(scores).sort(function (a, b) { return scores[b] - scores[a]; }).slice(0, 3);
    var cards = top.map(function (k, rank) {
      var p = PATHS[k];
      return '<a class="lp-picker-result" href="' + p.url + '">' +
        '<span class="lp-picker-rank">' + (rank === 0 ? "Best fit" : rank === 1 ? "Worth a look" : "Also consider") + "</span>" +
        '<span class="lp-picker-title">' + esc(p.title) + "</span>" +
        '<span class="lp-picker-blurb">' + esc(p.blurb) + "</span></a>";
    }).join("");
    root.innerHTML =
      '<div class="lp-picker-q">Based on your answers:</div>' +
      '<div class="lp-picker-results">' + cards + "</div>" +
      '<p class="lp-picker-note">These guides cover the paths our community has taken. There are more doors than we’ve written up. <a href="/paths/">Browse all the guides</a>, or <button type="button" class="lp-picker-restart">start over</button>.</p>';
    root.querySelector(".lp-picker-restart").addEventListener("click", function () { picks = []; renderQuestion(0); });
  }

  renderQuestion(0);
})();
</script>
